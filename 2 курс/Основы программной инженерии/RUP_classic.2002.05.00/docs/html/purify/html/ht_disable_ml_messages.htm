<h1>Disabling memory leaked messages</h1>

<p>If you do not want Purify to display a memory leaked message when the 
 program exits, set the option <a href="ht_opt_mem_leak.htm#MID_LEAKSATEXIT"><span 
 style="font-weight: bold;"><B><font style="font-family: Courier;"
									face=courier>-leaks-at-exit</font></B></span></a>=no.</p>

<p>This inhibits the automatic call of <a href="ht_api_mem_leak.htm"><span 
 style="font-weight: bold;"><B><font style="font-family: Courier;"
									face=courier>purify_all_leaks</font></B></span></a> 
 when the program exits. For details about how to use Purify options, click 
 <a href="ht_using_p_options.htm">
