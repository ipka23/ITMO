<h1>PMR: partial UMR</h1>

<p style="font-weight: normal;"><span>A PMR message indicates that a potential 
 UMR is occurring in an alignment pad. These errors are usually harmless, 
 and are <a href="ht_ov_suppressing_messages.htm" style="font-weight: bold;">suppressed</a> by default.</span></p>
